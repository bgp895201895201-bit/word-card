<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Practice Kids</title>
<link rel="stylesheet" href="style.css">
</head>

<body data-theme="light">

<div class="container">

<h1>單字學習小樂園</h1>

<label>孩子</label>
<select id="child-select"></select>
<button id="add-child-btn">新增孩子</button>

<hr>

<label>單字來源</label>
<select id="word-source">
<option value="elementary">國小</option>
<option value="junior">國中</option>
<option value="custom">自訂單字</option>
</select>

<!-- ⭐ 自訂單字 -->
<div id="custom-box" class="hidden">

<p>一行一筆：英文,中文</p>

<textarea id="customWords" rows="6"></textarea>

<button id="save-custom-btn">儲存單字</button>

<button onclick="exportData()">匯出資料</button>

<button onclick="document.getElementById('fileInput').click()">匯入資料</button>
<input type="file" id="fileInput" accept=".json">

</div>

<hr>

<label>模式</label>
<select id="mode">
<option value="en-zh">英文→中文</option>
<option value="zh-en">中文→英文</option>
</select>

<hr>

<div id="word-text">準備開始</div>
<div id="options"></div>

<button id="next-btn">下一題</button>
<button id="clear-wrong-btn">清除錯題</button>

<hr>

<label>
<input type="checkbox" id="showExample" checked>
顯示例句
</label>

<div id="example-box"></div>

</div>

<div class="ad-box">廣告位置</div>

<script src="wordlist.js"></script>
<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Word Practice 1.0</title>
<link rel="stylesheet" href="style.css">
</head>

<body data-theme="light">

<div class="container">

<h1>Word Practice 1.0</h1>

<label>孩子:</label> <select id="child-select"></select>

<button onclick="addChild()">＋新增孩子</button>

<hr>

<label>單字來源:</label> <select id="word-source">

<option value="built">內建單字</option>
<option value="custom">自訂單字</option>
</select>

<label>測驗模式:</label> <select id="mode">

<option value="en-zh">英文 → 中文</option>
<option value="zh-en">中文 → 英文</option>
</select>

<div id="theme-picker">

主題:

<span class="theme-dot" data-theme="light"></span> <span class="theme-dot" data-theme="dark"></span> <span class="theme-dot" data-theme="pink"></span> <span class="theme-dot" data-theme="blue"></span>

</div>

<div id="card-section">

<div id="word-text"></div>

<div id="options"></div>

<button onclick="nextWord()">下一題</button>

</div>

<label>
<input type="checkbox" id="showExample">
例句與文法
</label>

<div id="example-box"></div>

<hr>

<button onclick="importWords()">匯出資料</button>

<input type="file" id="fileInput">

</div>

<script src="script.js"></script>

</body>
</html>
